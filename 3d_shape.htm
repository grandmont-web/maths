<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇立體圖形實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; background-color: #f0f9ff; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .btn-shape { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 2px solid transparent; 
            background: white;
            color: #475569;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .btn-shape:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border-color: #bfdbfe;
            color: #3b82f6;
        }
        .btn-shape.active { 
            border-color: #3b82f6; 
            background-color: #eff6ff; 
            color: #1d4ed8; 
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
        
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; justify-content: center; align-items: center;
            z-index: 9999; font-size: 1.5rem; color: #3b82f6; transition: opacity 0.5s;
        }

        .feature-checkbox { accent-color: #3b82f6; transform: scale(1.1); cursor: pointer; }
        .feature-checkbox.accent-purple-500 { accent-color: #8b5cf6; }

        .btn-unfold {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }
        .btn-unfold:hover { transform: scale(1.02); box-shadow: 0 6px 15px rgba(139, 92, 246, 0.4); }
        .btn-unfold.active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .btn-unfold:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-slice {
            padding: 4px 8px;
            font-size: 0.85rem;
            border-radius: 6px;
            background-color: white;
            border: 1px solid #fed7aa;
            color: #9a3412;
            transition: all 0.2s;
        }
        .btn-slice:hover { background-color: #fff7ed; }
        .btn-slice.active {
            background-color: #f97316;
            color: white;
            border-color: #f97316;
            font-weight: bold;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #bbf7d0;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.85rem;
            color: #166534;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .stat-value { color: #15803d; font-weight: 800; font-size: 1rem; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="loading">正在準備積木...</div>

    <!-- 浮動按鈕區塊 -->
    <div class="absolute top-4 right-4 pointer-events-auto z-20">
        <button onclick="exportImage()" class="flex items-center gap-2 bg-white/95 backdrop-blur px-3 py-2 rounded-xl shadow-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 hover:text-blue-600 transition text-gray-700 font-bold text-sm group" title="匯出純白背景且無網格的圖片">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:stroke-blue-600"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            <span class="hidden sm:inline">拍照匯出</span>
        </button>
    </div>

    <div class="absolute top-0 left-0 w-full h-full flex flex-col md:flex-row pointer-events-none">
        <div class="pointer-events-auto w-full md:w-80 bg-white/95 backdrop-blur-md shadow-2xl p-4 flex flex-col overflow-y-auto max-h-[45vh] md:max-h-full z-10 border-r border-white/50">
            <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 mb-4 text-center flex items-center justify-center gap-2 drop-shadow-sm">
                <span>🧊</span> 神奇立體實驗室
            </h1>
            
            <!-- 1. 選擇立體 -->
            <div class="bg-blue-50/80 p-3 rounded-xl border border-blue-100 mb-3 shadow-sm flex-shrink-0">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-blue-800 text-xs uppercase tracking-wider flex items-center gap-1">
                        <span class="bg-blue-200 text-blue-700 px-1.5 py-0.5 rounded text-[10px]">1</span> 選擇立體
                    </h3>
                    <label class="flex items-center space-x-1 cursor-pointer bg-white/80 px-2 py-1 rounded border border-blue-200 hover:bg-blue-100 transition shadow-sm">
                        <input type="checkbox" id="compare-mode-toggle" class="accent-blue-600 cursor-pointer w-3 h-3" onchange="toggleCompareMode()">
                        <span class="text-[10px] font-bold text-blue-800">多選比較</span>
                    </label>
                </div>
                <div class="space-y-2">
                    <div>
                        <div class="text-[10px] text-blue-400 font-bold mb-1 ml-1">柱體家族</div>
                        <div class="grid grid-cols-3 gap-1.5">
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('cylinder')">圓柱</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('triPrism')">三角柱</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('rectPrism')">四角柱</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('pentPrism')">五角柱</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('hexPrism')">六角柱</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('heptPrism')">七角柱</button>
                        </div>
                    </div>
                    <div>
                        <div class="text-[10px] text-blue-400 font-bold mb-1 ml-1">錐體家族</div>
                        <div class="grid grid-cols-3 gap-1.5">
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('cone')">圓錐</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('triPyramid')">三角錐</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('rectPyramid')">四角錐</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('pentPyramid')">五角錐</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('hexPyramid')">六角錐</button>
                            <button class="btn-shape p-2 rounded-lg" onclick="selectShape('heptPyramid')">七角錐</button>
                        </div>
                    </div>
                    <div>
                        <button class="btn-shape w-full p-2 rounded-lg font-bold text-gray-500" onclick="selectShape('sphere')">球體</button>
                    </div>
                </div>
            </div>

            <!-- 數據與顯示區 -->
            <div id="info-panel-container" class="bg-emerald-50/80 p-3 rounded-xl mb-3 border border-emerald-100 shadow-sm flex-shrink-0">
                <!-- 由 JavaScript 填入 -->
            </div>

            <!-- 2. 截面觀察 -->
            <div class="bg-orange-50/80 p-3 rounded-xl mb-3 border border-orange-100 shadow-sm flex-shrink-0">
                <h3 class="font-bold text-orange-800 text-xs mb-2 uppercase tracking-wider flex items-center gap-1">
                    <span class="bg-orange-200 text-orange-800 px-1.5 py-0.5 rounded text-[10px]">2</span> 截面觀察
                </h3>
                <div class="flex justify-between gap-1.5 mb-2">
                    <button class="btn-slice active flex-1" onclick="setSliceMode('none')">無</button>
                    <button class="btn-slice flex-1" onclick="setSliceMode('y')">橫切</button>
                    <button class="btn-slice flex-1" onclick="setSliceMode('z')">直切</button>
                    <button class="btn-slice flex-1" onclick="setSliceMode('oblique')">斜切</button>
                </div>
                <div id="slice-slider-container" class="hidden px-1 pb-1">
                    <input type="range" id="slice-slider" min="-2" max="2" step="0.1" value="0" class="w-full h-1.5 bg-orange-200 rounded-lg appearance-none cursor-pointer accent-orange-500">
                </div>
            </div>

            <!-- 3. 圖形旋轉 -->
            <div class="bg-purple-50/80 p-3 rounded-xl mb-3 border border-purple-100 shadow-sm flex-shrink-0">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-purple-800 text-xs uppercase tracking-wider flex items-center gap-1">
                        <span class="bg-purple-200 text-purple-700 px-1.5 py-0.5 rounded text-[10px]">3</span> 圖形旋轉
                    </h3>
                    <button class="text-[10px] bg-white border border-purple-200 px-2 py-1 rounded hover:bg-purple-100 text-purple-600 font-bold transition shadow-sm" onclick="resetShapeRotation()">重設</button>
                </div>
                <div class="space-y-2 px-1">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-red-500 w-6">X軸</span>
                        <input type="range" id="rot-x" min="-180" max="180" value="0" class="flex-1 h-1.5 bg-red-200 rounded-lg appearance-none cursor-pointer accent-red-500" oninput="updateRotX(this.value)">
                        <span id="rot-x-val" class="text-[10px] text-gray-600 w-8 text-right font-mono">0°</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-green-500 w-6">Y軸</span>
                        <input type="range" id="rot-y" min="-180" max="180" value="0" class="flex-1 h-1.5 bg-green-200 rounded-lg appearance-none cursor-pointer accent-green-500" oninput="updateRotY(this.value)">
                        <span id="rot-y-val" class="text-[10px] text-gray-600 w-8 text-right font-mono">0°</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-blue-500 w-6">Z軸</span>
                        <input type="range" id="rot-z" min="-180" max="180" value="0" class="flex-1 h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-500" oninput="updateRotZ(this.value)">
                        <span id="rot-z-val" class="text-[10px] text-gray-600 w-8 text-right font-mono">0°</span>
                    </div>
                </div>
            </div>

            <!-- 4. 展開與調整 -->
            <div class="bg-gray-50/90 p-3 rounded-xl border border-gray-200 shadow-sm flex-shrink-0 mb-4">
                <h3 class="font-bold text-gray-700 text-xs uppercase tracking-wider flex items-center gap-1 mb-3">
                    <span class="bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded text-[10px]">4</span> 外觀調整與展開
                </h3>
                <div class="space-y-3 pb-2">
                    <button id="unfold-btn" class="btn-unfold w-full py-2.5 rounded-xl font-bold text-sm shadow-md flex items-center justify-center gap-2 transform active:scale-95" onclick="toggleUnfold()">
                        <span id="unfold-text">展開成摺紙圖</span>
                    </button>

                    <div class="flex items-center gap-3 bg-white p-2.5 rounded-xl border border-gray-100">
                        <div class="flex-1 flex flex-col gap-2">
                            <!-- 高度調整 -->
                            <div class="flex flex-col">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <label class="text-[10px] text-gray-500 font-bold uppercase">高度</label>
                                    <span id="height-val" class="text-[9px] text-indigo-500 font-bold">2.5</span>
                                </div>
                                <input type="range" id="height-slider" min="1" max="5" step="0.1" value="2.5" class="w-full h-1.5 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                            </div>
                            <!-- 闊度調整 -->
                            <div class="flex flex-col">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <label class="text-[10px] text-gray-500 font-bold uppercase">闊度</label>
                                    <span id="width-val" class="text-[9px] text-indigo-500 font-bold">1.5</span>
                                </div>
                                <input type="range" id="width-slider" min="0.5" max="3" step="0.1" value="1.5" class="w-full h-1.5 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                            </div>
                        </div>
                        
                        <!-- 顯示設定開關 -->
                        <div class="border-l pl-3 border-gray-200 flex flex-col justify-center gap-2 h-full">
                            <div class="flex gap-3 justify-center">
                                <label class="flex flex-col items-center cursor-pointer group">
                                    <span class="text-[10px] text-gray-500 font-bold mb-1 uppercase group-hover:text-indigo-600">網格</span>
                                    <input type="checkbox" id="grid-toggle" class="accent-indigo-500 w-4 h-4 cursor-pointer" checked onchange="toggleGrid()">
                                </label>
                                <label class="flex flex-col items-center cursor-pointer group" title="鏡頭自動環繞圖形">
                                    <span class="text-[10px] text-gray-500 font-bold mb-1 uppercase group-hover:text-indigo-600">自動環視</span>
                                    <input type="checkbox" id="rotate-toggle" class="accent-indigo-500 w-4 h-4 cursor-pointer" checked onchange="toggleAutoOrbit()">
                                </label>
                            </div>
                            <div class="flex justify-center">
                                <label class="flex flex-col items-center cursor-pointer group">
                                    <span class="text-[10px] text-gray-500 font-bold mb-1 uppercase group-hover:text-indigo-600">透視</span>
                                    <input type="checkbox" id="xray-toggle" class="accent-indigo-500 w-4 h-4 cursor-pointer" onchange="toggleTransparency()">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls;
        let mainGroup; 
        let gridHelper;
        
        // 狀態管理
        let selectedShapes = ['cylinder']; 
        let isCompareMode = false;
        
        let currentHeight = 2.5;
        let currentBaseSize = 1.5; 
        
        let rotX = 0, rotY = 0, rotZ = 0; // 圖形獨立旋轉角度
        
        let isTransparent = false;
        let isUnfolded = false;
        let sliceMode = 'none';
        let sliceValue = 0;
        let clipPlane;
        let globalCapMesh; // 獨立的全域截面封口
        
        const shapeColor = 0x60a5fa; 
        const edgeColor = 0x1e3a8a;
        const vertexColor = 0xff0000;
        const sectionColor = 0xf97316;

        const shapeData = {
            'cylinder':    { name: '圓柱', faces: 3, edges: 2, vertices: 0 },
            'cone':        { name: '圓錐', faces: 2, edges: 1, vertices: 1 },
            'triPrism':    { name: '三角柱', faces: 5, edges: 9, vertices: 6 },
            'rectPrism':   { name: '四角柱', faces: 6, edges: 12, vertices: 8 },
            'pentPrism':   { name: '五角柱', faces: 7, edges: 15, vertices: 10 },
            'hexPrism':    { name: '六角柱', faces: 8, edges: 18, vertices: 12 },
            'heptPrism':   { name: '七角柱', faces: 9, edges: 21, vertices: 14 },
            'triPyramid':  { name: '三角錐', faces: 4, edges: 6, vertices: 4 },
            'rectPyramid': { name: '四角錐', faces: 5, edges: 8, vertices: 5 },
            'pentPyramid': { name: '五角錐', faces: 6, edges: 10, vertices: 6 },
            'hexPyramid':  { name: '六角錐', faces: 7, edges: 12, vertices: 7 },
            'heptPyramid': { name: '七角錐', faces: 8, edges: 14, vertices: 8 },
            'sphere':      { name: '球體', faces: 1, edges: 0, vertices: 0 }
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f9ff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 加入 preserveDrawingBuffer: true 確保能夠正確擷取圖片
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.capabilities.logarithmicDepthBuffer = true;
            renderer.localClippingEnabled = true;
            
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
            backLight.position.set(-5, 5, -5);
            scene.add(backLight);

            gridHelper = new THREE.GridHelper(50, 50, 0xcbd5e1, 0xe2e8f0);
            scene.add(gridHelper);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            
            controls.addEventListener('start', () => { 
                controls.autoRotate = false; 
                const rotateToggle = document.getElementById('rotate-toggle');
                if(rotateToggle) rotateToggle.checked = false;
            });

            clipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
            
            // 建立全域截面封口 (利用 stencil buffer)
            const capMat = new THREE.MeshBasicMaterial({ 
                color: sectionColor, 
                side: THREE.DoubleSide, 
                stencilWrite: true, 
                stencilFunc: THREE.EqualStencilFunc, 
                stencilRef: 1 
            });
            globalCapMesh = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), capMat);
            globalCapMesh.visible = false;
            globalCapMesh.renderOrder = 1; 
            scene.add(globalCapMesh);

            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            updateInfoPanel();
            updateShapeSelectionUI();
            resetCamera();
            updateShape(); 

            window.addEventListener('resize', onWindowResize);
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 500);
            }, 800);

            animate();
        }

        function createTextSprite(text, planes = []) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(64, 64, 50, 0, 2 * Math.PI);
            ctx.fill();

            ctx.lineWidth = 6;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 50px "Noto Sans TC", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 68);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ 
                map: texture, 
                depthTest: true,
                clippingPlanes: planes
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(0.8, 0.8, 1);
            sprite.userData.isLabel = true;
            return sprite;
        }

        function createPartNameSprite(text, planes = []) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#8b5cf6';
            
            const r = 34, x = 28, y = 30, w = 200, h = 68;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();

            ctx.lineWidth = 6;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 42px "Noto Sans TC", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 68);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({
                map: texture,
                depthTest: true,
                clippingPlanes: planes
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(1.4, 0.7, 1);
            sprite.userData.isPartName = true;
            return sprite;
        }

        function getPolygonVertices(n, r) {
            const vertices = [];
            const startAngle = -Math.PI/2 - Math.PI/n;
            for (let i = 0; i < n; i++) {
                const theta = startAngle + i * (Math.PI * 2 / n);
                vertices.push(new THREE.Vector2(r * Math.cos(theta), r * Math.sin(theta)));
            }
            return vertices;
        }

        function createThickEdges(geometry, color) {
            const edgeGeo = new THREE.EdgesGeometry(geometry, 25); 
            const positions = edgeGeo.attributes.position.array;
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const thickness = 0.04;

            for (let i = 0; i < positions.length; i += 6) {
                const start = new THREE.Vector3(positions[i], positions[i+1], positions[i+2]);
                const end = new THREE.Vector3(positions[i+3], positions[i+4], positions[i+5]);
                
                const path = end.clone().sub(start);
                const len = path.length();
                if(len < 0.001) continue;

                const cylinder = new THREE.CylinderGeometry(thickness, thickness, len, 6);
                cylinder.translate(0, len/2, 0);
                cylinder.rotateX(Math.PI / 2);
                
                const mesh = new THREE.Mesh(cylinder, mat);
                mesh.position.copy(start);
                mesh.lookAt(end);
                mesh.userData.isEdge = true; 
                
                group.add(mesh);
            }
            group.userData.isEdgeGroup = true;
            return group;
        }

        function createFaceMesh(type, geometry, options = {}) {
            const { showEdges = true, showVertices = true, flatShading = true } = options;
            const material = new THREE.MeshPhongMaterial({
                color: shapeColor, shininess: 60, specular: 0x444444, flatShading: flatShading,
                side: THREE.DoubleSide, transparent: isTransparent, opacity: isTransparent ? 0.3 : 1.0,
                depthWrite: !isTransparent, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData.isFace = true; 
            mesh.userData.shapeType = type;
            
            if (showEdges && type !== 'sphere') {
                const thickEdges = createThickEdges(geometry, edgeColor);
                if(options.clippingPlanes) thickEdges.traverse(c => { if(c.isMesh) c.material.clippingPlanes = options.clippingPlanes; });
                mesh.add(thickEdges);
            }

            if (showVertices) {
                const sphereGeo = new THREE.SphereGeometry(0.12, 8, 8);
                const sphereMat = new THREE.MeshBasicMaterial({ color: vertexColor, clippingPlanes: options.clippingPlanes || [] });
                const pos = geometry.attributes.position;
                
                const addedVertices = new Set();

                for(let i=0; i<pos.count; i++){
                    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                    const isAxis = (Math.abs(x) < 0.01 && Math.abs(z) < 0.01); 
                    let skip = false;
                    
                    if(type.includes('cylinder') || type === 'sphere') skip = true;
                    // Cone: 頂點(尖端)在 y>0，底面中心在 y<0
                    else if (type === 'cone') { if (!isAxis || y < 0) skip = true; }
                    else if(type.includes('Prism') && isAxis) skip = true; 
                    // Pyramid: 頂端在 y>0，底面中心在 y<0
                    else if(type.includes('Pyramid')) { if (isAxis && y < 0) skip = true; }

                    if(!skip) {
                        const key = `${Math.round(x*100)},${Math.round(y*100)},${Math.round(z*100)}`;
                        if (!addedVertices.has(key)) {
                            addedVertices.add(key);
                            const v = new THREE.Mesh(sphereGeo, sphereMat);
                            v.position.set(x, y, z);
                            v.userData.isVertex = true;
                            v.userData.shapeType = type;
                            mesh.add(v);
                        }
                    }
                }
            }
            return mesh;
        }

        function createSolidWithSection(type, geometry, showVertices) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({
                color: shapeColor, shininess: 60, specular: 0x444444,
                flatShading: !(type.includes('cylinder')||type==='sphere'||type==='cone'),
                side: THREE.DoubleSide, clippingPlanes: [clipPlane]
            });
            const mesh = new THREE.Mesh(geometry, mat);
            mesh.userData.isFace = true; 
            mesh.userData.shapeType = type;
            group.add(mesh);
            
            // Stencil 寫入層，跟隨圖形旋轉
            const stencilMat = new THREE.MeshBasicMaterial({ 
                color: 0, side: THREE.BackSide, clippingPlanes: [clipPlane], 
                colorWrite: false, depthWrite: false, 
                stencilWrite: true, stencilFunc: THREE.AlwaysStencilFunc, 
                stencilFail: THREE.KeepStencilOp, stencilZFail: THREE.KeepStencilOp, stencilZPass: THREE.IncrementStencilOp 
            });
            group.add(new THREE.Mesh(geometry, stencilMat));
            
            if(type !== 'sphere') {
                const edges = createThickEdges(geometry, edgeColor);
                edges.traverse(c=>{
                    if(c.isMesh) { c.material.clippingPlanes=[clipPlane]; c.userData.shapeType = type; }
                });
                group.add(edges);
            }
            return group;
        }
        
        function updateClipPlane() {
            let normal = new THREE.Vector3(0, -1, 0); 
            if (sliceMode === 'z') normal.set(0, 0, -1);
            else if (sliceMode === 'oblique') normal.set(0, -1, -1).normalize();
            clipPlane.normal.copy(normal);
            clipPlane.constant = sliceValue; 
            
            // 對齊全域截面封口
            if (globalCapMesh) {
                const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), normal);
                globalCapMesh.setRotationFromQuaternion(quaternion);
                globalCapMesh.position.copy(normal.clone().multiplyScalar(-clipPlane.constant));
            }
        }

        function addSolidLabels(group, type, r, h, nSides, isCurved, planes) {
            const offset = 0.2; 
            
            if (type === 'sphere') {
                const sprite = createTextSprite(1, planes);
                sprite.position.set(0, r + offset, 0); 
                group.add(sprite);
            } else if (type.includes('Prism') || type === 'cylinder') {
                const topSprite = createTextSprite(1, planes);
                topSprite.position.set(0, h/2 + offset, 0);
                group.add(topSprite);
                
                const bottomSprite = createTextSprite(2, planes);
                bottomSprite.position.set(0, -h/2 - offset, 0);
                group.add(bottomSprite);
                
                if (isCurved) {
                    const sideSprite = createTextSprite(3, planes);
                    sideSprite.position.set(0, 0, r + offset);
                    group.add(sideSprite);
                } else {
                    const apothem = r * Math.cos(Math.PI / nSides);
                    const startAngle = Math.PI / nSides; 
                    for (let i = 0; i < nSides; i++) {
                        const theta = startAngle + i * (2 * Math.PI / nSides);
                        const sprite = createTextSprite(3 + i, planes);
                        const px = (apothem + offset) * Math.sin(theta); 
                        const pz = (apothem + offset) * Math.cos(theta);
                        sprite.position.set(px, 0, pz);
                        group.add(sprite);
                    }
                }
            } else if (type.includes('Pyramid') || type === 'cone') {
                const bottomSprite = createTextSprite(1, planes);
                bottomSprite.position.set(0, -h/2 - offset, 0);
                group.add(bottomSprite);
                
                if (isCurved) {
                    const sideSprite = createTextSprite(2, planes);
                    const currentRadius = r * (2/3);
                    sideSprite.position.set(0, 0, currentRadius + offset * 1.5); 
                    group.add(sideSprite);
                } else {
                    const apothem = r * Math.cos(Math.PI / nSides);
                    const startAngle = Math.PI / nSides;
                    for (let i = 0; i < nSides; i++) {
                        const theta = startAngle + i * (2 * Math.PI / nSides);
                        const sprite = createTextSprite(2 + i, planes);
                        const baseDist = (apothem * 2/3) + offset;
                        const px = baseDist * Math.sin(theta);
                        const pz = baseDist * Math.cos(theta);
                        sprite.position.set(px, 0, pz);
                        group.add(sprite);
                    }
                }
            }
        }

        function addPartNameLabels(group, type, r, h, nSides, isCurved, planes) {
            const offset = 0.6; 

            if (type === 'sphere') {
                const sprite = createPartNameSprite('曲面', planes);
                sprite.position.set(0, r + offset, 0);
                group.add(sprite);
            } else if (type.includes('Prism') || type === 'cylinder') {
                const topSprite = createPartNameSprite('底', planes);
                topSprite.position.set(0, h/2 + offset, 0);
                group.add(topSprite);

                const bottomSprite = createPartNameSprite('底', planes);
                bottomSprite.position.set(0, -h/2 - offset, 0);
                group.add(bottomSprite);

                if (isCurved) {
                    const sideSprite = createPartNameSprite('曲面', planes);
                    sideSprite.position.set(0, 0.4, r + offset);
                    group.add(sideSprite);
                } else {
                    const apothem = r * Math.cos(Math.PI / nSides);
                    const theta = Math.PI / nSides;
                    const px = (apothem + offset) * Math.sin(theta);
                    const pz = (apothem + offset) * Math.cos(theta);
                    const sprite = createPartNameSprite('側面', planes);
                    sprite.position.set(px, 0.4, pz);
                    group.add(sprite);
                }
            } else if (type.includes('Pyramid') || type === 'cone') {
                const bottomSprite = createPartNameSprite('底', planes);
                bottomSprite.position.set(0, -h/2 - offset, 0);
                group.add(bottomSprite);

                if (isCurved) {
                    const sideSprite = createPartNameSprite('曲面', planes);
                    const currentRadius = r * (2/3);
                    sideSprite.position.set(0, 0.4, currentRadius + offset * 1.5);
                    group.add(sideSprite);
                } else {
                    const apothem = r * Math.cos(Math.PI / nSides);
                    const theta = Math.PI / nSides;
                    const baseDist = (apothem * 2/3) + offset;
                    const px = baseDist * Math.sin(theta);
                    const pz = baseDist * Math.cos(theta);
                    const sprite = createPartNameSprite('側面', planes);
                    sprite.position.set(px, 0.4, pz);
                    group.add(sprite);
                }
            }
        }

        function createSolidMesh(type, r, h) {
            let nSides = 3;
            if (type.includes('rect')) nSides = 4;
            if (type.includes('pent')) nSides = 5;
            if (type.includes('hex')) nSides = 6;
            if (type.includes('hept')) nSides = 7;
            const isCurved = (type === 'cylinder' || type === 'cone' || type === 'sphere');

            let geo;
            if (type === 'sphere') {
                geo = new THREE.SphereGeometry(r, 64, 64);
            } else if (type.includes('Prism') || type === 'cylinder') {
                geo = new THREE.CylinderGeometry(r, r, h, isCurved ? 64 : nSides);
            } else {
                geo = new THREE.ConeGeometry(r, h, isCurved ? 64 : nSides);
            }

            if (type.includes('rect')) geo.rotateY(Math.PI/4);
            if (!isCurved && type !== 'sphere') geo.rotateY(Math.PI/2 - Math.PI/nSides);

            let meshOrGroup;
            const planes = sliceMode !== 'none' ? [clipPlane] : [];
            if (sliceMode !== 'none') {
                meshOrGroup = createSolidWithSection(type, geo, !isCurved);
            } else {
                meshOrGroup = createFaceMesh(type, geo, { showVertices: !isCurved, showInternalEdges: !isCurved, flatShading: !isCurved });
            }

            const rootGroup = new THREE.Group();
            rootGroup.add(meshOrGroup);

            const labelGroup = new THREE.Group();
            labelGroup.userData.isLabelGroup = true;
            addSolidLabels(labelGroup, type, r, h, nSides, isCurved, planes);
            addPartNameLabels(labelGroup, type, r, h, nSides, isCurved, planes); 
            rootGroup.add(labelGroup);

            return rootGroup;
        }

        function createFlatNet(type, r, h) {
            const root = new THREE.Group();
            if (type === 'sphere') return root;

            let nSides = 3;
            if (type.includes('rect')) nSides = 4;
            if (type.includes('pent')) nSides = 5;
            if (type.includes('hex')) nSides = 6;
            if (type.includes('hept')) nSides = 7;
            
            const isCurved = (type === 'cylinder' || type === 'cone');
            if (isCurved) nSides = 64;

            const labelOffset = 0.05;

            function getPolyShape(n, radius) {
                const shape = new THREE.Shape();
                const vertices2D = getPolygonVertices(n, radius);
                shape.moveTo(vertices2D[0].x, vertices2D[0].y);
                for(let i=1; i<n; i++) shape.lineTo(vertices2D[i].x, vertices2D[i].y);
                shape.closePath();
                return shape;
            }

            if (type.includes('Prism') || type === 'cylinder') {
                const sideWidth = isCurved ? (2 * Math.PI * r) / 64 : 2 * r * Math.sin(Math.PI / nSides);
                const totalWidth = isCurved ? (2 * Math.PI * r) : nSides * sideWidth;
                const apothem = r * Math.cos(Math.PI / nSides);
                
                const numPanels = isCurved ? 1 : nSides;
                const panelWidth = isCurved ? totalWidth : sideWidth;
                const midIndex = Math.floor((numPanels - 1) / 2);

                for (let i = 0; i < numPanels; i++) {
                    const planeGeo = new THREE.PlaneGeometry(panelWidth, h);
                    const planeMesh = createFaceMesh(type, planeGeo, { showVertices: !isCurved, flatShading: !isCurved });
                    const xPos = (i - (numPanels - 1) / 2) * panelWidth;
                    planeMesh.position.set(xPos, 0, 0);
                    
                    const sprite = createTextSprite(3 + i);
                    sprite.position.set(0, 0, labelOffset);
                    planeMesh.add(sprite);

                    if (i === midIndex) {
                        const partName = isCurved ? '曲面' : '側面';
                        const partSprite = createPartNameSprite(partName);
                        partSprite.position.set(0, -0.6, labelOffset + 0.01);
                        planeMesh.add(partSprite);
                    }
                    
                    root.add(planeMesh);
                }

                const baseShape = getPolyShape(isCurved ? 64 : nSides, r);
                const baseGeo = new THREE.ShapeGeometry(baseShape);
                const midX = (midIndex - (numPanels - 1) / 2) * panelWidth;
                const offset = isCurved ? r : apothem;

                const topMesh = createFaceMesh(type, baseGeo, { showVertices: !isCurved, flatShading: !isCurved });
                topMesh.position.set(midX, h/2 + offset, 0);
                const topSprite = createTextSprite(1); 
                topSprite.position.set(0, 0, labelOffset);
                topMesh.add(topSprite);
                
                const topPartSprite = createPartNameSprite('底');
                topPartSprite.position.set(0, -0.6, labelOffset + 0.01);
                topMesh.add(topPartSprite);
                
                root.add(topMesh);

                const bottomMesh = createFaceMesh(type, baseGeo, { showVertices: !isCurved, flatShading: !isCurved });
                bottomMesh.position.set(midX, -h/2 - offset, 0);
                bottomMesh.rotation.z = Math.PI;
                const bottomSprite = createTextSprite(2); 
                bottomSprite.position.set(0, 0, labelOffset);
                bottomMesh.add(bottomSprite);

                const bottomPartSprite = createPartNameSprite('底');
                bottomPartSprite.position.set(0, -0.6, labelOffset + 0.01);
                bottomMesh.add(bottomPartSprite);

                root.add(bottomMesh);
            }

            if (type.includes('Pyramid') || type === 'cone') {
                if (!isCurved) {
                    const sideWidth = 2 * r * Math.sin(Math.PI / nSides);
                    const apothem = r * Math.cos(Math.PI / nSides);
                    const slantHeight = Math.sqrt(h * h + apothem * apothem);

                    const baseShape = getPolyShape(nSides, r);
                    const baseMesh = createFaceMesh(type, new THREE.ShapeGeometry(baseShape), { showVertices: true, flatShading: true });
                    const baseSprite = createTextSprite(1); 
                    baseSprite.position.set(0, 0, labelOffset);
                    baseMesh.add(baseSprite);

                    const basePartSprite = createPartNameSprite('底');
                    basePartSprite.position.set(0, -0.6, labelOffset + 0.01);
                    baseMesh.add(basePartSprite);

                    root.add(baseMesh);

                    const midTri = Math.floor((nSides - 1) / 2);
                    for (let i = 0; i < nSides; i++) {
                        const triShape = new THREE.Shape();
                        triShape.moveTo(-sideWidth/2, 0);
                        triShape.lineTo(sideWidth/2, 0);
                        triShape.lineTo(0, slantHeight); 
                        triShape.closePath();
                        
                        const triMesh = createFaceMesh(type, new THREE.ShapeGeometry(triShape), { showVertices: true, flatShading: true });
                        const theta = -Math.PI/2 + i * (2 * Math.PI / nSides); 
                        
                        triMesh.position.set(apothem * Math.cos(theta), apothem * Math.sin(theta), 0);
                        triMesh.rotation.z = theta - Math.PI/2; 
                        
                        const sprite = createTextSprite(2 + i); 
                        sprite.position.set(0, slantHeight / 3, labelOffset); 
                        triMesh.add(sprite);
                        
                        if (i === midTri) {
                            const partSprite = createPartNameSprite('側面');
                            partSprite.position.set(0, slantHeight / 3 - 0.5, labelOffset + 0.01);
                            triMesh.add(partSprite);
                        }
                        
                        root.add(triMesh);
                    }
                } else {
                    const L = Math.sqrt(h*h + r*r);
                    const arcLength = 2 * Math.PI * r;
                    const theta = arcLength / L; 

                    const sectorShape = new THREE.Shape();
                    sectorShape.moveTo(0, 0);
                    sectorShape.absarc(0, 0, L, -theta/2, theta/2, false);
                    sectorShape.lineTo(0, 0);
                    
                    const sectorMesh = createFaceMesh(type, new THREE.ShapeGeometry(sectorShape, 64), { showVertices: false, flatShading: false });
                    sectorMesh.rotation.z = -Math.PI/2; 
                    sectorMesh.position.set(0, L, 0);   
                    
                    const sideSprite = createTextSprite(2);
                    sideSprite.position.set(L * 0.6, 0, labelOffset); 
                    sectorMesh.add(sideSprite);

                    const sectorPartSprite = createPartNameSprite('曲面');
                    sectorPartSprite.position.set(L * 0.6, -0.6, labelOffset + 0.01);
                    sectorMesh.add(sectorPartSprite);
                    
                    root.add(sectorMesh);

                    const baseShape = getPolyShape(64, r);
                    const baseMesh = createFaceMesh(type, new THREE.ShapeGeometry(baseShape), { showVertices: false, flatShading: false });
                    baseMesh.position.set(0, -r, 0); 
                    const baseSprite = createTextSprite(1);
                    baseSprite.position.set(0, 0, labelOffset);
                    baseMesh.add(baseSprite);

                    const basePartSprite = createPartNameSprite('底');
                    basePartSprite.position.set(0, -0.6, labelOffset + 0.01);
                    baseMesh.add(basePartSprite);

                    root.add(baseMesh);
                }
            }

            root.rotation.x = -Math.PI / 2;
            return root;
        }

        // 旋轉控制函式
        window.updateRotX = function(val) { rotX = parseInt(val); document.getElementById('rot-x-val').innerText = rotX + '°'; applyShapeRotation(); }
        window.updateRotY = function(val) { rotY = parseInt(val); document.getElementById('rot-y-val').innerText = rotY + '°'; applyShapeRotation(); }
        window.updateRotZ = function(val) { rotZ = parseInt(val); document.getElementById('rot-z-val').innerText = rotZ + '°'; applyShapeRotation(); }
        
        window.resetShapeRotation = function() {
            rotX = 0; rotY = 0; rotZ = 0;
            document.getElementById('rot-x').value = 0; document.getElementById('rot-x-val').innerText = '0°';
            document.getElementById('rot-y').value = 0; document.getElementById('rot-y-val').innerText = '0°';
            document.getElementById('rot-z').value = 0; document.getElementById('rot-z-val').innerText = '0°';
            applyShapeRotation();
        }
        
        function applyShapeRotation() {
            mainGroup.children.forEach(wrapper => {
                const pivotGroup = wrapper.children[0];
                if (pivotGroup && pivotGroup.userData.isPivot) {
                    pivotGroup.rotation.set(
                        THREE.MathUtils.degToRad(rotX),
                        THREE.MathUtils.degToRad(rotY),
                        THREE.MathUtils.degToRad(rotZ)
                    );
                }
            });
        }

        function updateShape() {
            mainGroup.clear();
            if(sliceMode !== 'none') updateClipPlane();
            
            let spacing = 5;
            if (isUnfolded) {
                spacing = Math.max(14, currentBaseSize * 2 * Math.PI + 2); 
            } else {
                spacing = Math.max(5, currentBaseSize * 2.5);
            }
            
            const startX = -((selectedShapes.length - 1) * spacing) / 2;

            selectedShapes.forEach((type, index) => {
                let meshOrGroup;
                const wrapper = new THREE.Group();
                wrapper.position.x = startX + index * spacing;
                
                const pivotGroup = new THREE.Group();
                pivotGroup.userData.isPivot = true; 
                
                if (isUnfolded && sliceMode === 'none') {
                    meshOrGroup = createFlatNet(type, currentBaseSize, currentHeight);
                    wrapper.position.y = 0;
                } else {
                    meshOrGroup = createSolidMesh(type, currentBaseSize, currentHeight);
                    // 為了旋轉時能依據圖形幾何中心旋轉，將其置中，再透過 wrapper 抬升回地面
                    const offsetY = (type === 'sphere') ? currentBaseSize : (currentHeight / 2);
                    wrapper.position.y = offsetY; 
                }
                
                pivotGroup.add(meshOrGroup);
                
                // 套用使用者獨立旋轉
                pivotGroup.rotation.set(
                    THREE.MathUtils.degToRad(rotX),
                    THREE.MathUtils.degToRad(rotY),
                    THREE.MathUtils.degToRad(rotZ)
                );
                
                wrapper.add(pivotGroup);
                mainGroup.add(wrapper);
            });
            
            updateVisibility();
        }

        function resetCamera() {
            const count = selectedShapes.length;
            if (isUnfolded) {
                if (count === 1) camera.position.set(0, 20, 0);
                else if (count === 2) camera.position.set(0, 35, 0);
                else camera.position.set(0, 50, 0); 
            } else {
                if (count === 1) camera.position.set(8, 6, 10);
                else if (count === 2) camera.position.set(12, 8, 15);
                else camera.position.set(16, 12, 22);
            }
            controls.target.set(0, 0, 0);
            controls.update();
        }

        window.toggleCompareMode = function() {
            isCompareMode = document.getElementById('compare-mode-toggle').checked;
            if (!isCompareMode && selectedShapes.length > 1) {
                selectedShapes = [selectedShapes[0]];
            }
            updateInfoPanel();
            updateShapeSelectionUI();
            updateSliceRange();
            resetCamera();
            updateShape();
        }

        window.selectShape = function(type) {
            if (isCompareMode) {
                if (selectedShapes.includes(type)) {
                    if (selectedShapes.length > 1) selectedShapes = selectedShapes.filter(s => s !== type);
                } else {
                    if (selectedShapes.length < 3) selectedShapes.push(type);
                    else { selectedShapes.shift(); selectedShapes.push(type); }
                }
            } else {
                selectedShapes = [type];
            }
            
            isUnfolded = false; 
            const btn = document.getElementById('unfold-btn');
            const txt = document.getElementById('unfold-text');
            btn.classList.remove('active');
            if(txt) txt.innerText = "展開成摺紙圖";
            
            updateInfoPanel();
            updateShapeSelectionUI();
            updateSliceRange();
            resetCamera();
            updateShape(); 
        }

        function updateShapeSelectionUI() {
            document.querySelectorAll('.btn-shape').forEach(btn => {
                const onclickAttr = btn.getAttribute('onclick');
                const type = onclickAttr.match(/'([^']+)'/)[1];
                if (selectedShapes.includes(type)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            const btn = document.getElementById('unfold-btn');
            const txt = document.getElementById('unfold-text');
            const allSpheres = selectedShapes.every(s => s === 'sphere');
            
            if (allSpheres && sliceMode === 'none') {
                 btn.disabled = true; if(txt) txt.innerText = "球體不能展開"; btn.style.opacity='0.5';
            } else if (sliceMode === 'none') {
                 btn.disabled = false; btn.style.opacity='1';
                 if(txt) txt.innerText = isUnfolded ? "摺疊回立體" : "展開成摺紙圖";
            }
        }

        function updateSliceRange() {
            const slider = document.getElementById('slice-slider');
            if (!slider || sliceMode === 'none') return;
            
            if (sliceMode === 'y') {
                slider.min = -0.5; slider.max = currentHeight + 0.5;
            } else if (sliceMode === 'z') {
                slider.min = -currentBaseSize - 0.5; slider.max = currentBaseSize + 0.5;
            } else if (sliceMode === 'oblique') {
                slider.min = -currentBaseSize - 0.5; slider.max = currentHeight + currentBaseSize + 0.5;
            }

            if (sliceValue > slider.max) { sliceValue = slider.max; slider.value = sliceValue; } 
            else if (sliceValue < slider.min) { sliceValue = slider.min; slider.value = sliceValue; }
        }

        function updateInfoPanel() {
            const container = document.getElementById('info-panel-container');
            
            const showFacesEl = document.getElementById('show-faces');
            const showEdgesEl = document.getElementById('show-edges');
            const showVerticesEl = document.getElementById('show-vertices');
            const showLabelsEl = document.getElementById('show-labels'); 
            const showPartNamesEl = document.getElementById('show-part-names'); 
            
            const showFacesChecked = showFacesEl ? showFacesEl.checked : true;
            const showEdgesChecked = showEdgesEl ? showEdgesEl.checked : true;
            const showVerticesChecked = showVerticesEl ? showVerticesEl.checked : false;
            const showLabelsChecked = showLabelsEl ? showLabelsEl.checked : false;
            const showPartNamesChecked = showPartNamesEl ? showPartNamesEl.checked : false;

            let html = '';
            
            if (selectedShapes.length === 1) {
                const data = shapeData[selectedShapes[0]];
                html = `
                    <h2 class="text-center font-bold text-emerald-800 mb-2 border-b border-emerald-200 pb-1 text-sm">${data.name}</h2>
                    <div class="flex justify-between mb-3 px-1">
                        <div class="stat-badge">面 <span class="stat-value">${data.faces}</span></div>
                        <div class="stat-badge">稜 <span class="stat-value">${data.edges}</span></div>
                        <div class="stat-badge">頂點 <span class="stat-value">${data.vertices}</span></div>
                    </div>
                `;
            } else {
                html = `
                    <h2 class="text-center font-bold text-emerald-800 mb-2 border-b border-emerald-200 pb-1 text-sm">立體比較 (${selectedShapes.length}個)</h2>
                    <div class="overflow-hidden mb-3 rounded-lg border border-emerald-100 shadow-sm">
                        <table class="w-full text-center text-xs text-gray-700 bg-white">
                            <thead class="bg-emerald-50 text-emerald-800">
                                <tr>
                                    <th class="p-1.5 border-b border-emerald-100">圖形</th>
                                    <th class="p-1.5 border-b border-emerald-100">面</th>
                                    <th class="p-1.5 border-b border-emerald-100">稜</th>
                                    <th class="p-1.5 border-b border-emerald-100">頂點</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${selectedShapes.map(type => {
                                    const d = shapeData[type];
                                    return `
                                    <tr class="border-b border-emerald-50 last:border-0 hover:bg-emerald-50/50">
                                        <td class="p-1.5 font-bold text-emerald-900">${d.name}</td>
                                        <td class="p-1.5 font-bold text-emerald-700">${d.faces}</td>
                                        <td class="p-1.5 font-bold text-emerald-700">${d.edges}</td>
                                        <td class="p-1.5 font-bold text-emerald-700">${d.vertices}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            html += `
                <div class="flex flex-col gap-2 mt-2 bg-white/80 p-2.5 rounded-lg shadow-sm border border-emerald-100">
                    <div class="flex justify-center gap-4 border-b border-gray-100 pb-2">
                        <label class="flex items-center space-x-1 cursor-pointer select-none hover:bg-emerald-50 p-1 rounded transition">
                            <input type="checkbox" id="show-faces" class="feature-checkbox" ${showFacesChecked ? 'checked' : ''} onchange="updateVisibility()">
                            <span class="text-xs font-bold text-gray-700">面</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer select-none hover:bg-emerald-50 p-1 rounded transition">
                            <input type="checkbox" id="show-edges" class="feature-checkbox" ${showEdgesChecked ? 'checked' : ''} onchange="updateVisibility()">
                            <span class="text-xs font-bold text-gray-700">稜</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer select-none hover:bg-emerald-50 p-1 rounded transition">
                            <input type="checkbox" id="show-vertices" class="feature-checkbox" ${showVerticesChecked ? 'checked' : ''} onchange="updateVisibility()">
                            <span class="text-xs font-bold text-gray-700">頂點</span>
                        </label>
                    </div>
                    <div class="flex justify-center gap-3 pt-1">
                        <label class="flex items-center space-x-1 cursor-pointer select-none bg-amber-50 hover:bg-amber-100 p-1.5 rounded-md transition border border-amber-200">
                            <input type="checkbox" id="show-labels" class="feature-checkbox accent-amber-500" ${showLabelsChecked ? 'checked' : ''} onchange="updateVisibility()">
                            <span class="text-xs font-bold text-amber-800">標示面數</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer select-none bg-purple-50 hover:bg-purple-100 p-1.5 rounded-md transition border border-purple-200">
                            <input type="checkbox" id="show-part-names" class="feature-checkbox accent-purple-500" ${showPartNamesChecked ? 'checked' : ''} onchange="updateVisibility()">
                            <span class="text-xs font-bold text-purple-800">各部分名稱</span>
                        </label>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        window.setSliceMode = function(mode) {
            sliceMode = mode;
            const sliderContainer = document.getElementById('slice-slider-container');
            const slider = document.getElementById('slice-slider');
            const unfoldBtn = document.getElementById('unfold-btn');
            const unfoldTxt = document.getElementById('unfold-text');
            
            document.querySelectorAll('.btn-slice').forEach(btn => {
                if (btn.getAttribute('onclick').includes(`'${mode}'`)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            if (mode === 'none') {
                sliderContainer.classList.add('hidden');
                if (globalCapMesh) globalCapMesh.visible = false;
                updateShapeSelectionUI(); 
            } else {
                sliderContainer.classList.remove('hidden');
                if(isUnfolded) toggleUnfold(); 
                unfoldBtn.disabled = true;
                if(unfoldTxt) unfoldTxt.innerText = "截面模式中無法展開";
                unfoldBtn.style.opacity = '0.5';
                
                if (globalCapMesh) globalCapMesh.visible = true;

                if (mode === 'y') { slider.min = -0.5; slider.max = currentHeight + 0.5; slider.value = currentHeight / 2; } 
                else if (mode === 'z') { slider.min = -currentBaseSize - 0.5; slider.max = currentBaseSize + 0.5; slider.value = 0; } 
                else if (mode === 'oblique') { slider.min = -currentBaseSize - 0.5; slider.max = currentHeight + currentBaseSize + 0.5; slider.value = currentHeight / 2; }
                sliceValue = parseFloat(slider.value);
            }
            updateShape();
        }
        
        document.getElementById('slice-slider').addEventListener('input', function() { sliceValue = parseFloat(this.value); updateShape(); });
        
        function toggleUnfold() {
            isUnfolded = !isUnfolded;
            const btn = document.getElementById('unfold-btn');
            const txt = document.getElementById('unfold-text');
            if (isUnfolded) { btn.classList.add('active'); if(txt) txt.innerText = "摺疊回立體"; } 
            else { btn.classList.remove('active'); if(txt) txt.innerText = "展開成摺紙圖"; }
            resetCamera();
            updateShape();
        }

        window.updateVisibility = function() {
            const faceCb = document.getElementById('show-faces');
            const edgeCb = document.getElementById('show-edges');
            const vertCb = document.getElementById('show-vertices');
            const labelCb = document.getElementById('show-labels'); 
            const partNameCb = document.getElementById('show-part-names'); 
            
            const showFaces = faceCb ? faceCb.checked : true;
            const showEdges = edgeCb ? edgeCb.checked : true;
            const showVertices = vertCb ? vertCb.checked : false;
            const showLabels = labelCb ? labelCb.checked : false;
            const showPartNames = partNameCb ? partNameCb.checked : false;

            mainGroup.traverse(obj => {
                if (obj.userData.isFace && obj.material) obj.material.visible = showFaces;
                if (obj.userData.isEdgeGroup || obj.type === 'LineSegments') obj.visible = showEdges;
                if (obj.userData.isVertex) {
                    const sType = obj.userData.shapeType;
                    if(sType==='cylinder'||sType==='sphere') obj.visible = false;
                    else obj.visible = showVertices;
                    if(isUnfolded && !showVertices) obj.visible = false;
                }
                if (obj.userData.isLabel) {
                    obj.visible = showLabels;
                }
                if (obj.userData.isPartName) {
                    obj.visible = showPartNames;
                }
            });
        }

        window.toggleGrid = function() { if (gridHelper) gridHelper.visible = document.getElementById('grid-toggle').checked; }
        window.toggleTransparency = function() { isTransparent = document.getElementById('xray-toggle').checked; updateShape(); }
        
        // 鏡頭環視開關
        window.toggleAutoOrbit = function() {
            if (controls) {
                controls.autoRotate = document.getElementById('rotate-toggle').checked;
            }
        }
        
        // 匯出純白無網格圖片功能
        window.exportImage = function() {
            // 1. 記錄當前狀態
            const originalBackground = scene.background;
            const originalGridVisible = gridHelper ? gridHelper.visible : false;
            
            // 2. 設定匯出狀態 (純白背景，隱藏網格)
            scene.background = new THREE.Color(0xffffff);
            if (gridHelper) gridHelper.visible = false;
            
            // 3. 強制渲染一幀以套用新設定
            renderer.render(scene, camera);
            
            // 4. 擷取圖片資料
            const dataURL = renderer.domElement.toDataURL('image/png');
            
            // 5. 建立下載連結並觸發
            const link = document.createElement('a');
            link.download = '神奇立體圖形.png';
            link.href = dataURL;
            link.click();
            
            // 6. 恢復原始狀態
            scene.background = originalBackground;
            if (gridHelper) gridHelper.visible = originalGridVisible;
            renderer.render(scene, camera);
        };
        
        document.getElementById('height-slider').addEventListener('input', function() { 
            currentHeight = parseFloat(this.value); 
            document.getElementById('height-val').innerText = currentHeight.toFixed(1);
            updateSliceRange(); 
            updateShape(); 
        });

        document.getElementById('width-slider').addEventListener('input', function() { 
            currentBaseSize = parseFloat(this.value); 
            document.getElementById('width-val').innerText = currentBaseSize.toFixed(1);
            updateSliceRange(); 
            updateShape(); 
        });
        
        function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        
        init();
    </script>
</body>
</html>
